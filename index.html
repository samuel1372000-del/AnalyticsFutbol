<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Football Tracker Elite v20</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0c0c0c; --surf: #111111; --card: #161616; --border: #232323;
            --accent: #00d68f; --tA: #f43f5e; --tB: #3b9eff; --ball: #f5a623;
            --th: #ebebeb; --tp: #7a7a7a; --tm: #404040;
            --f-body: 'Manrope', sans-serif; --f-data: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--th); font-family: var(--f-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 55px 20px 15px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .match-clock { font-family: var(--f-data); font-size: 15px; color: var(--accent); font-weight: 700; }

        .nav-scroller { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--tp); font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--th); border-bottom-color: var(--accent); background: rgba(0,214,143,0.05); }

        main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: viewFadeIn 0.3s ease-out; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 15px; position: relative; }
        .card-label { font-family: var(--f-data); font-size: 9px; color: var(--tp); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }

        /* SCORE & POSSESSION */
        .progress-track { height: 6px; background: #222; border-radius: 3px; overflow: hidden; display: flex; margin-top: 10px; }
        .poss-labels { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--f-data); font-size: 10px; font-weight: 700; }

        /* VIDEO PLAYER */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* TAGGING */
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tag-btn { background: var(--surf); border: 1px solid var(--border); color: var(--th); padding: 14px; font-size: 10px; font-weight: 700; border-radius: 4px; text-align: left; border-left: 4px solid var(--tm); }
        .tag-btn:active { opacity: 0.6; transform: scale(0.98); }
        
        .ev-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .ev-item:active { background: rgba(255,255,255,0.05); }

        .btn-action { width: 100%; background: var(--accent); border: none; color: #000; font-weight: 800; padding: 16px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn-story { background: #c084fc; color: #fff; margin-top: 15px; }

        .pitch-box { width: 100%; aspect-ratio: 105/68; background: #0a1808; position: relative; border: 1px solid var(--border); overflow: hidden; }
        .player-node { width: 20px; height: 20px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 8.5px; font-weight: 800; border: 1.5px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="brand">ANALYTICS PRO</div>
        <div class="match-clock" id="timer">00:00</div>
    </header>

    <nav class="nav-scroller">
        <button class="tab-btn active" onclick="App.nav('live', this)">Dashboard</button>
        <button class="tab-btn" onclick="App.nav('tactical', this)">Táctico</button>
        <button class="tab-btn" onclick="App.nav('videos', this)">Vídeos</button>
        <button class="tab-btn" onclick="App.nav('events', this)">Eventos</button>
        <button class="tab-btn" onclick="App.nav('report', this)">Informe</button>
    </nav>

    <main>
        <section id="view-live" class="view-section active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:36px; color:var(--tA); font-weight:700" id="sA">0</div><div style="font-size:8px; color:var(--tp)">LOCAL</div></div>
                    <div style="font-weight:900; opacity:0.1; font-size:18px">VS</div>
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:36px; color:var(--tB); font-weight:700" id="sB">0</div><div style="font-size:8px; color:var(--tp)">VISITANTE</div></div>
                </div>
                <div class="progress-track">
                    <div id="pb-a" style="width:50%; background:var(--tA); transition:0.8s"></div>
                    <div id="pb-b" style="width:50%; background:var(--tB); transition:0.8s"></div>
                </div>
                <div class="poss-labels">
                    <span style="color:var(--tA)" id="tx-pa">50%</span>
                    <span style="color:var(--tm)">POSESIÓN</span>
                    <span style="color:var(--tB)" id="tx-pb">50%</span>
                </div>
            </div>
            <div class="pitch-box">
                <svg style="position:absolute; width:100%; height:100%" viewBox="0 0 105 68"><rect width="105" height="68" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/><line x1="52.5" y1="0" x2="52.5" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/><circle cx="52.5" cy="34" r="9.15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/></svg>
                <div id="radar"></div>
            </div>
        </section>

        <section id="view-videos" class="view-section">
            <div class="card">
                <span class="card-label">Sincronización con Eventos</span>
                <div class="video-box">
                    <video id="v-player" controls poster="https://via.placeholder.com/600x340/111/fff?text=ESPERANDO+SEÑAL"></video>
                </div>
                <p style="font-size:10px; color:var(--tp); margin-top:10px; text-align:center">Toca un evento en la pestaña 'Eventos' para saltar al clip.</p>
            </div>
        </section>

        <section id="view-events" class="view-section">
            <div class="card">
                <span class="card-label">Panel de Etiquetado</span>
                <div style="display:flex; gap:6px; margin-bottom:12px">
                    <button id="selA" class="tab-btn active" style="flex:1; border:1px solid var(--border)" onclick="App.setTeam('A')">EQ. A</button>
                    <button id="selB" class="tab-btn" style="flex:1; border:1px solid var(--border)" onclick="App.setTeam('B')">EQ. B</button>
                </div>
                <div class="tag-grid">
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('GOL')">GOL</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('RECUPERACIÓN')">RECUPERACIÓN</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('PÉRDIDA')">PÉRDIDA</button>
                    <button class="tag-btn" style="border-left-color:var(--tB)" onclick="App.log('CÓRNER')">CÓRNER</button>
                </div>
            </div>
            <div class="card"><span class="card-label">Cronología de Clips</span><div id="log-ev"></div></div>
        </section>

        <section id="view-report" class="view-section">
            <div class="card">
                <button class="btn-action" onclick="App.exportPDF()">Generar Informe Técnico (PDF)</button>
                <button class="btn-action btn-story" onclick="App.exportStory()">Exportar Story para Redes</button>
            </div>
        </section>
    </main>

    <script>
        const App = {
            db: null, team: 'A', events: [], lastM: null,
            init: async () => {
                App.db = window.supabase.createClient("https://zdckdlrgtoglmvgdrvcn.supabase.co", "sb_publishable_bGfCRIXGSuGb5XK_SJ0tdw_XYNIHW14");
                App.sync(); setInterval(App.sync, 5000);
            },
            nav: (id, btn) => {
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).classList.add('active'); btn.classList.add('active');
            },
            setTeam: (t) => {
                App.team = t;
                document.getElementById('selA').classList.toggle('active', t==='A');
                document.getElementById('selB').classList.toggle('active', t==='B');
            },
            log: (type) => {
                const vid = document.getElementById('v-player');
                const e = { type, team: App.team, time: document.getElementById('timer').innerText, seconds: vid.currentTime, id: Date.now() };
                App.events.unshift(e);
                App.renderEvents();
            },
            renderEvents: () => {
                document.getElementById('log-ev').innerHTML = App.events.map(ev => `
                    <div class="ev-item" onclick="App.jumpTo(${ev.seconds})">
                        <div>
                            <div style="font-weight:700; color:${ev.team==='A'?'var(--tA)':'var(--tB)'}">${ev.type}</div>
                            <div style="font-size:9px; color:var(--tm)">Equipo ${ev.team}</div>
                        </div>
                        <div style="font-family:var(--f-data); font-size:11px; color:var(--accent)">${ev.time} ➔</div>
                    </div>
                `).join('');
            },
            jumpTo: (sec) => {
                const vid = document.getElementById('v-player');
                App.nav('videos', document.querySelector('[onclick*="videos"]'));
                vid.currentTime = sec; vid.play();
            },
            sync: async () => {
                const { data } = await App.db.from('matches').select('*').order('created_at', { ascending: false }).limit(1);
                if (data && data[0]) {
                    App.lastM = data[0]; const m = data[0];
                    document.getElementById('sA').innerText = m.team_a_goals; document.getElementById('sB').innerText = m.team_b_goals;
                    const pa = m.possession_a || 50;
                    document.getElementById('pb-a').style.width = pa + "%"; document.getElementById('pb-b').style.width = (100 - pa) + "%";
                    document.getElementById('tx-pa').innerText = pa + "%"; document.getElementById('tx-pb').innerText = (100 - pa) + "%";
                    if (m.full_data?.positions) {
                        document.getElementById('radar').innerHTML = m.full_data.positions.map(p => `
                            <div class="player-node" style="left:${p.x}%; top:${p.y}%; background-color:${p.team==='A'?'var(--tA)':'var(--tB)'}">${p.id}</div>
                        `).join('');
                    }
                }
            },
            exportPDF: () => { window.print(); },
            exportStory: () => {
                const m = App.lastM;
                const win = window.open('', '_blank', 'width=400,height=700');
                win.document.write(`
                    <html><head><style>
                        body{background:#0c0c0c; color:#fff; font-family:sans-serif; text-align:center; padding:50px 20px;}
                        .score{font-size:80px; font-weight:900; margin:40px 0;}
                        .team{font-size:12px; color:#777; letter-spacing:4px;}
                        .bar{height:10px; background:#222; border-radius:5px; display:flex; overflow:hidden; margin:30px 0;}
                        .stat-box{background:#161616; padding:20px; border-radius:15px; margin-top:40px;}
                        .brand{font-size:10px; color:#00d68f; letter-spacing:3px;}
                    </style></head><body>
                        <div class="brand">ANALYTICS ELITE</div>
                        <div style="margin-top:60px">MATCH SUMMARY</div>
                        <div class="score"><span style="color:#f43f5e">${m.team_a_goals}</span> - <span style="color:#3b9eff">${m.team_b_goals}</span></div>
                        <div class="team">LOCAL VS VISITANTE</div>
                        <div class="bar"><div style="width:${m.possession_a}%; background:#f43f5e"></div><div style="width:${100-m.possession_a}%; background:#3b9eff"></div></div>
                        <div class="stat-box">
                            <div style="font-size:24px; font-weight:800; color:#00d68f">${m.possession_a}%</div>
                            <div style="font-size:9px; color:#777;">POSESIÓN TOTAL</div>
                        </div>
                        <p style="font-size:9px; margin-top:100px; color:#444">Generado por Football Tracker v20</p>
                    </body></html>
                `);
                win.document.close();
            }
        };
        window.onload = App.init;
    </script>
</body>
</html>
