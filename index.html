<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AnalyticsFutbol Elite v28</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0c0c0c; --surf: #111111; --card: #161616; --border: #232323;
            --accent: #00d68f; --tA: #f43f5e; --tB: #3b9eff; --ball: #f5a623;
            --th: #ebebeb; --tp: #7a7a7a; --tm: #404040;
            --f-body: 'Manrope', sans-serif; --f-data: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--th); font-family: var(--f-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 55px 20px 15px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .demo-badge { font-family: var(--f-data); font-size: 9px; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--tm); color: var(--tm); cursor: pointer; }
        .demo-badge.active { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 15px rgba(0,214,143,0.3); }

        .nav-scroller { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--tp); font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--th); border-bottom-color: var(--accent); background: rgba(0,214,143,0.05); }

        main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: viewFadeIn 0.3s ease-out; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 15px; }
        .card-label { font-family: var(--f-data); font-size: 9px; color: var(--tp); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }

        /* KPI DISPLAY */
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-num { font-family: var(--f-data); font-size: 42px; font-weight: 700; }
        .poss-track { height: 6px; background: #222; border-radius: 3px; overflow: hidden; display: flex; margin-bottom: 10px; }
        .poss-fill { height: 100%; transition: width 0.8s ease; }

        /* PITCH */
        .pitch-box { width: 100%; aspect-ratio: 105/68; background: #0a1808; position: relative; border: 1px solid var(--border); overflow: hidden; border-radius: 4px; }
        .player { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; border: 1.5px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.5); transition: 0.1s linear; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; font-family: var(--f-data); font-size: 11px; }
        th { text-align: left; color: var(--tp); padding-bottom: 10px; border-bottom: 1px solid var(--border); font-size: 9px; }
        td { padding: 12px 0; border-bottom: 1px solid #1a1a1a; }

        /* TAGGING */
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tag-btn { background: var(--surf); border: 1px solid var(--border); color: var(--th); padding: 14px; font-size: 10px; font-weight: 700; border-radius: 4px; text-align: left; border-left: 4px solid var(--tm); }
        .team-selector { display: flex; gap: 6px; margin-bottom: 12px; }
        .t-btn { flex: 1; padding: 14px; border-radius: 4px; border: 2px solid var(--border); font-size: 11px; font-weight: 800; background: transparent; color: var(--tp); transition: 0.2s; }
        .t-btn.active-A { border-color: var(--tA); color: var(--tA); background: rgba(244,63,94,0.1); }
        .t-btn.active-B { border-color: var(--tB); color: var(--tB); background: rgba(59,158,255,0.1); }

        /* VIDEO */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { width: 100%; border: none; font-weight: 800; padding: 16px; border-radius: 4px; font-size: 12px; text-transform: uppercase; cursor: pointer; margin-bottom: 12px; }
        .btn-green { background: var(--accent); color: #000; }
        .btn-gold { background: linear-gradient(135deg, #00d68f, #c084fc); color: #fff; }

        .ev-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="brand">AnalyticsFutbol</div>
        <div id="demo-badge" class="demo-badge" onclick="App.toggleDemo()">DEMO: OFF</div>
    </header>

    <nav class="nav-scroller">
        <button class="tab-btn active" onclick="App.nav('live', this)">Dashboard</button>
        <button class="tab-btn" onclick="App.nav('tactical', this)">Táctico</button>
        <button class="tab-btn" onclick="App.nav('physic', this)">Físico</button>
        <button class="tab-btn" onclick="App.nav('clips', this)">Clips</button>
        <button class="tab-btn" onclick="App.nav('events', this)">Eventos</button>
        <button class="tab-btn" onclick="App.nav('report', this)">Informe</button>
    </nav>

    <main>
        <section id="view-live" class="view-section active">
            <div class="card">
                <div class="score-row">
                    <div style="text-align:center"><div class="score-num" style="color:var(--tA)" id="sA">0</div><div style="font-size:8px; color:var(--tp)">LOCAL</div></div>
                    <div style="font-weight:900; opacity:0.1; font-size:20px">VS</div>
                    <div style="text-align:center"><div class="score-num" style="color:var(--tB)" id="sB">0</div><div style="font-size:8px; color:var(--tp)">VISITANTE</div></div>
                </div>
                <div class="poss-track"><div id="pb-a" style="width:50%; background:var(--tA)" class="poss-fill"></div><div id="pb-b" style="width:50%; background:var(--tB)" class="poss-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-family:var(--f-data); font-size:11px; font-weight:700">
                    <span id="tx-pa" style="color:var(--tA)">50%</span>
                    <span id="timer-ui" style="background:#1a1a1a; padding:2px 8px; border-radius:3px; color:#fff">00:00</span>
                    <span id="tx-pb" style="color:var(--tB)">50%</span>
                </div>
            </div>
            <div class="pitch-box">
                <svg style="position:absolute; width:100%; height:100%" viewBox="0 0 105 68"><rect width="105" height="68" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><line x1="52.5" y1="0" x2="52.5" y2="68" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="52.5" cy="34" r="9.15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>
                <div id="players-radar"></div>
            </div>
        </section>

        <section id="view-tactical" class="view-section">
            <div class="card">
                <span class="card-label">Métricas de Estructura Dinámica</span>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div style="font-family:var(--f-data); font-size:26px; font-weight:700" id="res-comp">--</div><div style="font-size:8px; color:var(--tp); margin-top:5px">COMPACIDAD</div></div>
                    <div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div style="font-family:var(--f-data); font-size:26px; font-weight:700; color:var(--accent)" id="res-press">--</div><div style="font-size:8px; color:var(--tp); margin-top:5px">ALT. PRESIÓN</div></div>
                </div>
            </div>
        </section>

        <section id="view-physic" class="view-section">
            <div class="card">
                <span class="card-label">Rendimiento Individual (KM/H)</span>
                <table>
                    <thead><tr><th>DORSAL</th><th>POS</th><th>DIST (KM)</th><th>V.MÁX</th></tr></thead>
                    <tbody id="p-body"></tbody>
                </table>
            </div>
        </section>

        <section id="view-clips" class="view-section">
            <div class="card">
                <span class="card-label">Video Review - AI Marked</span>
                <div class="video-container">
                    <video id="vplayer" controls poster="https://via.placeholder.com/600x340/111/fff?text=ESPERANDO+VIDEO+IA"></video>
                </div>
            </div>
        </section>

        <section id="view-events" class="view-section">
            <div class="card">
                <span class="card-label">Panel de Etiquetado Táctico</span>
                <div class="team-selector">
                    <button id="selA" class="t-btn active-A" onclick="App.setTeam('A')">EQUIPO A</button>
                    <button id="selB" class="t-btn" onclick="App.setTeam('B')">EQUIPO B</button>
                </div>
                <div class="tag-grid">
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('GOL')">GOL</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('RECUP.')">RECUPERACIÓN</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('PÉRDIDA')">PÉRDIDA</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('TIRO')">TIRO</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('FALTA')">FALTA</button>
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('OFFSIDE')">OFFSIDE</button>
                </div>
            </div>
            <div class="card"><div id="log-list"></div></div>
        </section>

        <section id="view-report" class="view-section">
            <div class="card" style="text-align:center; padding:30px 20px;">
                <button class="btn-main btn-green" onclick="App.exportPDF()">Generar Informe Editorial PDF</button>
                <button class="btn-main btn-gold" onclick="App.exportStory()">Exportar Story Nanobanana Gold</button>
            </div>
        </section>
    </main>

    <script>
        const App = {
            db: null, team: 'A', events: [], isDemo: false, lastM: { team_a_goals:0, team_b_goals:0, possession_a:50 },
            
            init: async () => {
                App.db = window.supabase.createClient("https://zdckdlrgtoglmvgdrvcn.supabase.co", "sb_publishable_bGfCRIXGSuGb5XK_SJ0tdw_XYNIHW14");
                setInterval(App.engineLoop, 100);
                App.sync(); setInterval(App.sync, 5000);
            },

            toggleDemo: () => {
                App.isDemo = !App.isDemo;
                const b = document.getElementById('demo-badge');
                b.innerText = App.isDemo ? "DEMO: ON" : "DEMO: OFF";
                b.classList.toggle('active', App.isDemo);
            },

            nav: (id, btn) => {
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).classList.add('active'); btn.classList.add('active');
            },

            setTeam: (t) => {
                App.team = t;
                const bA = document.getElementById('selA'); const bB = document.getElementById('selB');
                bA.className = t==='A' ? 't-btn active-A' : 't-btn';
                bB.className = t==='B' ? 't-btn active-B' : 't-btn';
            },

            log: (type) => {
                const vid = document.getElementById('vplayer');
                const e = { type, team: App.team, time: document.getElementById('timer-ui').innerText, sec: vid.currentTime || 0, id: Date.now() };
                App.events.unshift(e);
                document.getElementById('log-list').innerHTML = App.events.map(ev => `
                    <div class="ev-item" onclick="App.jumpTo(${ev.sec})">
                        <div style="font-weight:700; color:${ev.team==='A'?'var(--tA)':'var(--tB)'}">${ev.type} EQ.${ev.team}</div>
                        <div style="font-family:var(--f-data); font-size:11px; color:var(--accent)">${ev.time} ➔</div>
                    </div>
                `).join('');
            },

            jumpTo: (s) => {
                const v = document.getElementById('vplayer');
                App.nav('clips', document.querySelector('[onclick*="clips"]'));
                v.currentTime = s; v.play();
            },

            engineLoop: () => {
                if (!App.isDemo) return;
                const t = Date.now() / 1000;
                const mockPlayers = [];
                for(let i=1; i<=11; i++){
                    mockPlayers.push({ id:i, team:'A', x: 20 + Math.sin(t + i)*5, y: 15 + i*4, line: i<5?'DEF':i<9?'MID':'FWD', pos:'CT' });
                    mockPlayers.push({ id:i, team:'B', x: 80 + Math.cos(t + i)*5, y: 15 + i*4, line: 'DEF', pos:'CT' });
                }
                App.render({ 
                    team_a_goals: App.lastM.team_a_goals, team_b_goals: App.lastM.team_b_goals, 
                    possession_a: 50 + Math.sin(t*0.5)*10,
                    full_data: { positions: mockPlayers, players: mockPlayers.map(p=>({ id:p.id, team:p.team, pos:p.pos, dist:(t/20).toFixed(2), maxSpd:(25+Math.random()*7).toFixed(1) })) }
                });
            },

            sync: async () => {
                if (App.isDemo) return;
                const { data } = await App.db.from('matches').select('*').order('created_at', { ascending: false }).limit(1);
                if (data && data[0]) { App.lastM = data[0]; App.render(data[0]); }
            },

            render: (m) => {
                document.getElementById('sA').innerText = m.team_a_goals; document.getElementById('sB').innerText = m.team_b_goals;
                const pa = Math.round(m.possession_a || 50);
                document.getElementById('pb-a').style.width = pa + "%"; document.getElementById('pb-b').style.width = (100-pa) + "%";
                document.getElementById('tx-pa').innerText = pa + "%"; document.getElementById('tx-pb').innerText = (100-pa) + "%";
                
                if (m.full_data?.positions) {
                    const pl = m.full_data.positions;
                    document.getElementById('players-radar').innerHTML = pl.map(p => `<div class="player" style="left:${p.x}%; top:${p.y}%; background-color:${p.team==='A'?'var(--tA)':'var(--tB)'}">${p.id}</div>`).join('');
                    const lh = (line) => { const g = pl.filter(p => p.line === line && p.team === 'A'); return g.length ? (g.reduce((s,p)=>s+p.x, 0)/g.length).toFixed(0) : 0; };
                    const dA=lh("DEF"), fA=lh("FWD");
                    document.getElementById('res-comp').innerText = Math.abs(fA - dA) + "m";
                    document.getElementById('res-press').innerText = (pl.filter(p=>p.team==='A').reduce((s,p)=>s+p.x,0)/11).toFixed(0) + "m";
                }
                if (m.full_data?.players) {
                    document.getElementById('p-body').innerHTML = m.full_data.players.slice(0,10).map(p => `<tr><td style="color:${p.team==='A'?'var(--tA)':'var(--tB)'}; font-weight:800">#${p.id}</td><td>${p.pos}</td><td>${p.dist}</td><td style="color:var(--accent)">${p.maxSpd}</td></tr>`).join('');
                }
            },

            exportPDF: () => { window.print(); },
            exportStory: () => {
                const m = App.lastM; const win = window.open('', '_blank', 'width=375,height=812');
                win.document.write(`<html><head><style>body{background:#000;color:#fff;font-family:'Manrope',sans-serif;padding:50px;text-align:center} .h1{font-size:140px;font-weight:900;margin:40px 0;letter-spacing:-10px;background:linear-gradient(#fff,#444);-webkit-background-clip:text;-webkit-text-fill-color:transparent} .tag{font-size:12px;letter-spacing:6px;color:#00d68f;border:1px solid #00d68f;display:inline-block;padding:5px 15px}</style></head><body><div class="tag">#ANALYTICSFUTBOL</div><div class="h1">${m.team_a_goals}<br/>${m.team_b_goals}</div><div style="font-size:42px;font-weight:900;color:#00d68f">${Math.round(m.possession_a)}% POSS.</div></body></html>`);
                win.document.close();
            }
        };
        window.onload = App.init;
    </script>
</body>
</html>
