<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FOOTBALL.TRACKER Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Elite Tactical Palette */
            --bg-deep: #0a0b10;
            --bg-card: #151720;
            --accent: #00e699;
            --teamA: #ff3366;
            --teamB: #3399ff;
            --text-main: #ffffff;
            --text-muted: #717686;
            --border: rgba(255,255,255,0.08);
            --pitch: #1a3a2a;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            padding-bottom: calc(100px + var(--safe-area-bottom));
        }

        /* --- Header con Menú Desplegable --- */
        header { 
            padding: 50px 20px 0px; background: rgba(10,11,16,0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 14px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .status-badge { font-size: 9px; font-weight: 800; color: var(--accent); border: 1px solid var(--accent); padding: 3px 8px; border-radius: 4px; background: rgba(0,230,153,0.1); }

        /* Dropdown Táctico */
        .tactical-menu { position: relative; margin-bottom: 15px; }
        .menu-trigger {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            padding: 12px 15px; color: var(--text-main); font-size: 12px; font-weight: 700;
            text-transform: uppercase; cursor: pointer;
        }
        .menu-options {
            display: none; position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            overflow: hidden; z-index: 1010; transition: 0.2s;
        }
        .menu-options.open { display: block; animation: slideDown 0.3s; }
        .menu-item { padding: 12px 15px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .menu-item:last-child { border-bottom: none; }
        .menu-item.active { color: var(--text-main); background: rgba(0,230,153,0.05); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Vistas y Layout --- */
        .content { padding: 15px; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Componentes Pro: Cards --- */
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .card-header-muted { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-bottom: 15px; display: block; }

        /* Marcador de Posesión y Goles (Simulado) */
        .live-scoreboard { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .score-val { font-size: 48px; font-weight: 900; line-height: 1; }
