<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Football Tracker Elite v12</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0c0c0c; --surf: #111111; --card: #161616; --border: #232323;
            --accent: #00d68f; --tA: #f43f5e; --tB: #3b9eff; --ball: #f5a623;
            --th: #ebebeb; --tp: #7a7a7a; --tm: #404040;
            --f-body: 'Manrope', sans-serif; --f-data: 'Roboto Mono', monospace;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--th); font-family: var(--f-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 55px 20px 15px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-scroller { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--tp); font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--th); border-bottom-color: var(--accent); background: rgba(0,214,143,0.05); }
        main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .view { display: none; } .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 15px; }
        .card-label { font-family: var(--f-data); font-size: 9px; color: var(--tp); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .pitch { width: 100%; aspect-ratio: 105/68; background: #0a1808; position: relative; border: 1px solid var(--border); overflow: hidden; }
        .player { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; border: 1.5px solid #fff; }
        footer { padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); background: var(--surf); border-top: 1px solid var(--border); }
        .btn-report { width: 100%; background: var(--accent); border: none; color: #000; font-weight: 800; padding: 14px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-family: var(--f-data); font-size: 10px; }
        th { text-align: left; color: var(--tp); padding-bottom: 8px; }
        td { padding: 8px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight:800; letter-spacing:-0.5px">ANALYTICS PRO</div>
        <div style="font-family:var(--f-data); font-size:14px; color:var(--accent)" id="clock">00:00</div>
    </header>
    <div class="nav-scroller">
        <button class="tab-btn active" onclick="App.nav('live', this)">Dashboard</button>
        <button class="tab-btn" onclick="App.nav('physic', this)">Físico</button>
        <button class="tab-btn" onclick="App.nav('tactical', this)">Táctico</button>
        <button class="tab-btn" onclick="App.nav('events', this)">Eventos</button>
        <button class="tab-btn" onclick="App.nav('report', this)">Informe</button>
    </div>
    <main>
        <section id="view-live" class="view active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:32px; color:var(--tA)" id="score-a">0</div><div style="font-size:8px; color:var(--tp)">LOCAL</div></div>
                    <div style="font-weight:900; opacity:0.1">VS</div>
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:32px; color:var(--tB)" id="score-b">0</div><div style="font-size:8px; color:var(--tp)">VISITANTE</div></div>
                </div>
                <div style="height:4px; background:#222; border-radius:2px; overflow:hidden; display:flex"><div id="pb-a" style="width:50%; background:var(--tA)"></div><div id="pb-b" style="width:50%; background:var(--tB)"></div></div>
            </div>
            <div class="pitch"><svg viewBox="0 0 105 68" style="width:100%; height:100%; position:absolute"><rect width="105" height="68" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/><line x1="52.5" y1="0" x2="52.5" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/><circle cx="52.5" cy="34" r="9.15" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/></svg><div id="radar"></div></div>
        </section>
        <section id="view-physic" class="view"><div class="card"><span class="card-label">Rendimiento Físico</span><table id="p-table"><thead><tr><th>ID</th><th>DIST</th><th>V.MÁX</th></tr></thead><tbody></tbody></table><div id="p-wait" style="font-size:10px; color:var(--tp); text-align:center; padding:20px">Esperando datos del PC...</div></div></section>
        <section id="view-tactical" class="view"><div class="card"><span class="card-label">Métricas de Estructura</span><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><div style="background:#0f0f0f; padding:15px; border-radius:4px"><div style="font-family:var(--f-data); font-size:20px" id="tac-comp">--</div><div style="font-size:8px; color:var(--tp)">COMPACIDAD</div></div><div style="background:#0f0f0f; padding:15px; border-radius:4px"><div style="font-family:var(--f-data); font-size:20px; color:var(--accent)" id="tac-press">--</div><div style="font-size:8px; color:var(--tp)">ALT. PRESIÓN</div></div></div></div></section>
        <section id="view-events" class="view"><div class="card"><span class="card-label">Registro de Eventos</span><div id="e-log" style="font-size:10px; font-family:var(--f-data)"></div></div></section>
        <section id="view-report" class="view"><div class="card"><span class="card-label">Previsualización Informe</span><div id="r-pre" style="font-size:11px; line-height:1.6">No hay datos suficientes para el informe.</div></div></section>
    </main>
    <footer><button class="btn-report" onclick="App.generatePDF()">Generar Informe PDF Detallado</button></footer>
    <script>
        const App = {
            db: null, events: [], lastMatch: null,
            init: async () => {
                App.db = window.supabase.createClient("https://zdckdlrgtoglmvgdrvcn.supabase.co", "sb_publishable_bGfCRIXGSuGb5XK_SJ0tdw_XYNIHW14");
                App.sync(); setInterval(App.sync, 5000);
            },
            nav: (id, btn) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).classList.add('active'); btn.classList.add('active');
            },
            sync: async () => {
                const { data } = await App.db.from('matches').select('*').order('created_at', { ascending: false }).limit(1);
                if (data && data[0]) {
                    App.lastMatch = data[0]; const m = data[0];
                    document.getElementById('score-a').innerText = m.team_a_goals;
                    document.getElementById('score-b').innerText = m.team_b_goals;
                    const pa = m.possession_a || 50;
                    document.getElementById('pb-a').style.width = pa + "%"; document.getElementById('pb-b').style.width = (100 - pa) + "%";
                    if (m.full_data?.positions) {
                        document.getElementById('radar').innerHTML = m.full_data.positions.map(p => `<div class="player" style="left:${p.x}%; top:${p.y}%; background-color:${p.team==='A'?'var(--tA)':'var(--tB)'}">${p.id}</div>`).join('');
                    }
                    if (m.full_data?.players) {
                        document.getElementById('p-wait').style.display = 'none';
                        document.getElementById('p-table').querySelector('tbody').innerHTML = m.full_data.players.map(p => `<tr><td>#${p.id}</td><td>${p.dist}km</td><td>${p.maxSpd}km/h</td></tr>`).join('');
                    }
                    if (m.full_data?.stats) {
                        document.getElementById('tac-comp').innerText = m.full_data.stats.compacidad + "m";
                        document.getElementById('tac-press').innerText = m.full_data.stats.presion + "m";
                    }
                }
            },
            generatePDF: () => {
                const m = App.lastMatch; if(!m) return;
                const html = `<html><head><title>Informe Elite</title><style>body{font-family:sans-serif;padding:40px} .header{background:#0c0c0c;color:#fff;padding:20px;border-radius:8px} .stat-box{display:flex;gap:20px;margin-top:20px} .stat{background:#f4f4f4;padding:15px;border-radius:4px;flex:1}</style></head>
                <body><div class="header"><h1>INFORME TÁCTICO: ${m.name || 'Partido'}</h1><p>Resultado: ${m.team_a_goals} - ${m.team_b_goals} | Posesión: ${m.possession_a}%</p></div>
                <div class="stat-box"><div class="stat"><h3>Físico</h3><p>Distancia total: ${m.full_data?.stats?.distancia || '--'}km</p></div><div class="stat"><h3>Táctico</h3><p>Compacidad: ${m.full_data?.stats?.compacidad || '--'}m</p></div></div>
                <h3>Estadísticas Individuales</h3><table border="1" width="100%" cellpadding="10" style="border-collapse:collapse"><thead><tr><th>ID</th><th>Distancia</th><th>V. Máx</th></tr></thead><tbody>
                ${m.full_data?.players?.map(p => `<tr><td>#${p.id}</td><td>${p.dist}km</td><td>${p.maxSpd}km/h</td></tr>`).join('') || '<tr><td colspan="3">Sin datos individuales</td></tr>'}
                </tbody></table><p style="margin-top:40px; font-size:10px; color:#888">Generado por Football Tracker v12</p></body></html>`;
                const win = window.open('', '_blank'); win.document.write(html); win.document.close(); setTimeout(() => win.print(), 500);
            }
        };
        window.onload = App.init;
    </script>
</body>
</html>
