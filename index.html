<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AnalyticsFutbol Elite v29</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0c0c0c; --surf: #111111; --card: #161616; --border: #232323;
            --accent: #00d68f; --tA: #f43f5e; --tB: #3b9eff; --ball: #f5a623;
            --th: #ebebeb; --tp: #7a7a7a; --tm: #404040;
            --f-body: 'Manrope', sans-serif; --f-data: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--th); font-family: var(--f-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 55px 20px 15px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        
        .timer-ctrl { display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); }
        #timer-display { font-family: var(--f-data); font-size: 14px; font-weight: 700; color: var(--accent); }

        .nav-scroller { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--tp); font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--th); border-bottom-color: var(--accent); background: rgba(0,214,143,0.05); }

        main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 15px; }
        .card-label { font-family: var(--f-data); font-size: 9px; color: var(--tp); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }

        /* VIDEO & TELESTRATION */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        canvas.active { pointer-events: all; }

        /* TAGGING */
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tag-btn { background: var(--surf); border: 1px solid var(--border); color: var(--th); padding: 14px; font-size: 10px; font-weight: 700; border-radius: 4px; border-left: 4px solid var(--tm); }
        .team-sel { display: flex; gap: 6px; margin-bottom: 12px; }
        .t-opt { flex: 1; padding: 14px; border-radius: 4px; border: 2px solid var(--border); font-size: 11px; font-weight: 800; background: transparent; color: var(--tp); }
        .t-opt.active-A { border-color: var(--tA); color: var(--tA); background: rgba(244,63,94,0.1); }
        .t-opt.active-B { border-color: var(--tB); color: var(--tB); background: rgba(59,158,255,0.1); }

        .btn-action { width: 100%; border: none; font-weight: 800; padding: 16px; border-radius: 4px; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-s { background: #333; color: #fff; }

        .player-node { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; border: 1.5px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="brand">AnalyticsFutbol</div>
        <div class="timer-ctrl">
            <span id="timer-display">00:00</span>
            <button onclick="App.toggleTimer()" id="timer-btn" style="background:none; border:none; color:#fff; font-size:12px">START</button>
        </div>
    </header>

    <nav class="nav-scroller">
        <button class="tab-btn active" onclick="App.nav('live', this)">Live</button>
        <button class="tab-btn" onclick="App.nav('tactical', this)">Táctico</button>
        <button class="tab-btn" onclick="App.nav('physic', this)">Físico</button>
        <button class="tab-btn" onclick="App.nav('clips', this)">Clips</button>
        <button class="tab-btn" onclick="App.nav('events', this)">Eventos</button>
        <button class="tab-btn" onclick="App.nav('report', this)">Informe</button>
    </nav>

    <main>
        <section id="view-live" class="view-section active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:38px; color:var(--tA); font-weight:700" id="sA">0</div><div style="font-size:8px; color:var(--tp)">LOCAL</div></div>
                    <div style="font-weight:900; opacity:0.1; font-size:20px">VS</div>
                    <div style="text-align:center"><div style="font-family:var(--f-data); font-size:38px; color:var(--tB); font-weight:700" id="sB">0</div><div style="font-size:8px; color:var(--tp)">VISITANTE</div></div>
                </div>
                <div style="height:6px; background:#222; border-radius:3px; overflow:hidden; display:flex">
                    <div id="pb-a" style="width:50%; background:var(--tA); transition:0.8s"></div>
                    <div id="pb-b" style="width:50%; background:var(--tB); transition:0.8s"></div>
                </div>
            </div>
            <div style="width:100%; aspect-ratio:105/68; background:#0a1808; position:relative; border-radius:4px; border:1px solid var(--border); overflow:hidden">
                <svg style="position:absolute; width:100%; height:100%" viewBox="0 0 105 68"><rect width="105" height="68" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><line x1="52.5" y1="0" x2="52.5" y2="68" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="52.5" cy="34" r="9.15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>
                <div id="radar-layer"></div>
            </div>
        </section>

        <section id="view-clips" class="view-section">
            <div class="card">
                <span class="card-label">Análisis de Clips e IA</span>
                <div class="video-container" id="video-container">
                    <video id="vplayer" controls poster="https://via.placeholder.com/600x340/111/fff?text=VIDEO+LISTO"></video>
                    <canvas id="telestration"></canvas>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px">
                    <button class="btn-action btn-s" style="flex:1" onclick="App.clearCanvas()">Limpiar Dibujo</button>
                    <button class="btn-action btn-p" style="flex:1" id="draw-btn" onclick="App.toggleDraw()">Modo Dibujo</button>
                </div>
            </div>
            <div class="card"><span class="card-label">Cola de Clips Solicitados</span><div id="clip-queue" style="font-size:10px; color:var(--tp)">Los clips recortados aparecerán aquí...</div></div>
        </section>

        <section id="view-events" class="view-section">
            <div class="card">
                <span class="card-label">Panel de Tagging</span>
                <div class="team-sel">
                    <button id="selA" class="t-opt active-A" onclick="App.setTeam('A')">EQUIPO A</button>
                    <button id="selB" class="t-opt" onclick="App.setTeam('B')">EQUIPO B</button>
                </div>
                <div class="tag-grid">
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('GOL')">GOL</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('RECUP.')">RECUPERACIÓN</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('PÉRDIDA')">PÉRDIDA</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('TIRO')">TIRO</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('FALTA')">FALTA</button>
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('OFFSIDE')">OFFSIDE</button>
                </div>
            </div>
            <div class="card"><div id="log-list"></div></div>
        </section>

        <section id="view-tactical" class="view-section"><div class="card"><span class="card-label">Métricas de Bloque</span><div style="display:grid; grid-template-columns:1fr 1fr; gap:12px"><div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div id="res-comp" style="font-family:var(--f-data); font-size:24px">--</div><div style="font-size:8px; color:var(--tp)">COMPACIDAD</div></div><div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div id="res-press" style="font-family:var(--f-data); font-size:24px; color:var(--accent)">--</div><div style="font-size:8px; color:var(--tp)">ALT. PRESIÓN</div></div></div></div></section>
        <section id="view-physic" class="view-section"><div class="card"><span class="card-label">Rendimiento Físico</span><table style="width:100%"><tbody id="p-body"></tbody></table></div></section>
        <section id="view-report" class="view-section"><div class="card" style="text-align:center"><button class="btn-action btn-p" onclick="window.print()">Exportar Informe PDF</button></div></section>
    </main>

    <script>
        const App = {
            db: null, team: 'A', events: [], timer: 0, tInterval: null, isDrawing: false,
            init: async () => {
                App.db = window.supabase.createClient("https://zdckdlrgtoglmvgdrvcn.supabase.co", "sb_publishable_bGfCRIXGSuGb5XK_SJ0tdw_XYNIHW14");
                App.initCanvas();
                App.sync(); setInterval(App.sync, 5000);
            },
            nav: (id, btn) => {
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).classList.add('active'); btn.classList.add('active');
            },
            toggleTimer: () => {
                if (App.tInterval) {
                    clearInterval(App.tInterval); App.tInterval = null;
                    document.getElementById('timer-btn').innerText = 'RESUME';
                } else {
                    App.tInterval = setInterval(() => {
                        App.timer++;
                        const m = Math.floor(App.timer / 60).toString().padStart(2,'0');
                        const s = (App.timer % 60).toString().padStart(2,'0');
                        document.getElementById('timer-display').innerText = `${m}:${s}`;
                    }, 1000);
                    document.getElementById('timer-btn').innerText = 'PAUSE';
                }
            },
            setTeam: (t) => {
                App.team = t;
                document.getElementById('selA').className = t==='A' ? 't-opt active-A' : 't-opt';
                document.getElementById('selB').className = t==='B' ? 't-opt active-B' : 't-opt';
            },
            log: (type) => {
                const vid = document.getElementById('vplayer');
                const e = { type, team: App.team, time: document.getElementById('timer-display').innerText, videoSec: vid.currentTime, id: Date.now() };
                App.events.unshift(e);
                document.getElementById('log-list').innerHTML = App.events.map(ev => `<div class="ev-item" onclick="App.jumpTo(${ev.videoSec})"><b>${ev.type} EQ.${ev.team}</b> <span>${ev.time}</span></div>`).join('');
            },
            jumpTo: (s) => {
                const v = document.getElementById('vplayer');
                App.nav('clips', document.querySelector('[onclick*="clips"]'));
                v.currentTime = s; v.play();
            },
            sync: async () => {
                const { data } = await App.db.from('matches').select('*').order('created_at', { ascending: false }).limit(1);
                if (data && data[0]) {
                    const m = data[0];
                    document.getElementById('sA').innerText = m.team_a_goals; document.getElementById('sB').innerText = m.team_b_goals;
                    if (m.full_data?.positions) {
                        document.getElementById('radar-layer').innerHTML = m.full_data.positions.map(p => `<div class="player-node" style="left:${p.x}%; top:${p.y}%; background-color:${p.team==='A'?'var(--tA)':'var(--tB)'}">${p.id}</div>`).join('');
                    }
                }
            },
            // TELESTRATION (DIBUJO)
            initCanvas: () => {
                const cv = document.getElementById('telestration');
                const ctx = cv.getContext('2d');
                let drawing = false;
                cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
                cv.addEventListener('touchstart', (e) => { if(!App.isDrawing) return; drawing = true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - cv.offsetLeft, e.touches[0].clientY - cv.offsetTop); });
                cv.addEventListener('touchmove', (e) => { if(!drawing) return; ctx.lineTo(e.touches[0].clientX - cv.offsetLeft, e.touches[0].clientY - cv.offsetTop); ctx.strokeStyle = '#00d68f'; ctx.lineWidth = 3; ctx.stroke(); });
                cv.addEventListener('touchend', () => drawing = false);
            },
            toggleDraw: () => {
                App.isDrawing = !App.isDrawing;
                document.getElementById('telestration').classList.toggle('active', App.isDrawing);
                document.getElementById('draw-btn').innerText = App.isDrawing ? 'DESACTIVAR LÁPIZ' : 'MODO DIBUJO';
            },
            clearCanvas: () => {
                const cv = document.getElementById('telestration');
                cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
            }
        };
        window.onload = App.init;
    </script>
</body>
</html>
