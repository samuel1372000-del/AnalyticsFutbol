<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AnalyticsFutbol Elite v31</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0c0c0c; --surf: #111111; --card: #161616; --border: #232323;
            --accent: #00d68f; --tA: #f43f5e; --tB: #3b9eff; --ball: #f5a623;
            --th: #ebebeb; --tp: #7a7a7a; --tm: #404040;
            --f-body: 'Manrope', sans-serif; --f-data: 'Roboto Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--th); font-family: var(--f-body); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER & CHRONO */
        header { padding: 55px 20px 15px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .brand { font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }
        .chrono-box { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
        .min-btn { background: none; border: none; color: var(--tp); font-size: 18px; padding: 0 8px; font-weight: 800; cursor: pointer; }
        #timer-display { font-family: var(--f-data); font-size: 14px; font-weight: 700; color: #fff; min-width: 45px; text-align: center; }

        /* NAVIGATION */
        .nav-scroller { display: flex; background: var(--surf); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 15px 18px; border: none; background: none; color: var(--tp); font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--th); border-bottom-color: var(--accent); background: rgba(0,214,143,0.05); }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: viewFadeIn 0.3s ease-out; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 15px; position: relative; }
        .card-label { font-family: var(--f-data); font-size: 9px; color: var(--tp); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }

        /* DASHBOARD COMPONENTS */
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-val { font-family: var(--f-data); font-size: 42px; font-weight: 700; }
        .poss-track { height: 6px; background: #222; border-radius: 3px; overflow: hidden; display: flex; margin-bottom: 10px; }
        .poss-fill { height: 100%; transition: width 0.8s ease; }
        .pitch-box { width: 100%; aspect-ratio: 105/68; background: #0a1808; position: relative; border: 1px solid var(--border); overflow: hidden; border-radius: 4px; }
        .player-dot { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; border: 1.5px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.5); transition: 0.1s linear; }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; font-family: var(--f-data); font-size: 11px; }
        th { text-align: left; color: var(--tp); padding-bottom: 10px; border-bottom: 1px solid var(--border); font-size: 9px; text-transform: uppercase; }
        td { padding: 12px 0; border-bottom: 1px solid #1a1a1a; }

        /* TAGGING PANEL */
        .tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tag-btn { background: var(--surf); border: 1px solid var(--border); color: var(--th); padding: 14px; font-size: 10px; font-weight: 700; border-radius: 4px; text-align: left; border-left: 4px solid var(--tm); }
        .team-sel { display: flex; gap: 6px; margin-bottom: 12px; }
        .t-opt { flex: 1; padding: 14px; border-radius: 4px; border: 2px solid var(--border); font-size: 11px; font-weight: 800; background: transparent; color: var(--tp); transition: 0.2s; }
        .t-opt.active-A { border-color: var(--tA); color: var(--tA); background: rgba(244,63,94,0.15); }
        .t-opt.active-B { border-color: var(--tB); color: var(--tB); background: rgba(59,158,255,0.15); }

        /* VIDEO & PIZARRA */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        canvas.active { pointer-events: all; }

        /* BUTTONS */
        .btn-action { width: 100%; border: none; font-weight: 800; padding: 16px; border-radius: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-bottom: 12px; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-nanobanana { background: linear-gradient(135deg, #00d68f, #c084fc); color: #fff; }

        .ev-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="brand">AnalyticsFutbol</div>
        <div class="chrono-box">
            <button class="min-btn" onclick="App.adjustTime(-1)">−</button>
            <span id="timer-display">00:00</span>
            <button class="min-btn" onclick="App.adjustTime(1)">+</button>
            <button onclick="App.toggleTimer()" id="play-btn" style="background:none; border:none; color:var(--accent); font-weight:800; font-size:10px; margin-left:5px">START</button>
        </div>
    </header>

    <nav class="nav-scroller">
        <button class="tab-btn active" onclick="App.nav('live', this)">Dashboard</button>
        <button class="tab-btn" onclick="App.nav('tactical', this)">Táctico</button>
        <button class="tab-btn" onclick="App.nav('physic', this)">Físico</button>
        <button class="tab-btn" onclick="App.nav('clips', this)">Clips</button>
        <button class="tab-btn" onclick="App.nav('events', this)">Eventos</button>
        <button class="tab-btn" onclick="App.nav('report', this)">Informe</button>
    </nav>

    <main>
        <section id="view-live" class="view-section active">
            <div class="card">
                <div class="score-row">
                    <div style="text-align:center"><div class="score-val" style="color:var(--tA)" id="sA">0</div><div style="font-size:8px; color:var(--tp)">LOCAL</div></div>
                    <div style="font-weight:900; opacity:0.1; font-size:20px">VS</div>
                    <div style="text-align:center"><div class="score-val" style="color:var(--tB)" id="sB">0</div><div style="font-size:8px; color:var(--tp)">VISITANTE</div></div>
                </div>
                <div class="poss-track"><div id="pb-a" style="width:50%; background:var(--tA)" class="poss-fill"></div><div id="pb-b" style="width:50%; background:var(--tB)" class="poss-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-family:var(--f-data); font-size:11px; font-weight:700">
                    <span id="tx-pa" style="color:var(--tA)">50%</span>
                    <span style="color:var(--tm); letter-spacing:2px">POSESIÓN</span>
                    <span id="tx-pb" style="color:var(--tB)">50%</span>
                </div>
            </div>
            <div class="pitch">
                <svg style="position:absolute; width:100%; height:100%" viewBox="0 0 105 68"><rect width="105" height="68" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><line x1="52.5" y1="0" x2="52.5" y2="68" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="52.5" cy="34" r="9.15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>
                <div id="radar-layer"></div>
            </div>
        </section>

        <section id="view-tactical" class="view-section">
            <div class="card">
                <span class="card-label">Análisis de Bloque Dinámico</span>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div id="res-comp" style="font-family:var(--f-data); font-size:24px; font-weight:700">--</div><div style="font-size:8px; color:var(--tp); margin-top:5px">COMPACIDAD</div></div>
                    <div style="background:#0f0f0f; padding:20px; border-radius:4px; text-align:center"><div id="res-press" style="font-family:var(--f-data); font-size:24px; font-weight:700; color:var(--accent)">--</div><div style="font-size:8px; color:var(--tp); margin-top:5px">ALT. PRESIÓN</div></div>
                </div>
            </div>
        </section>

        <section id="view-physic" class="view-section">
            <div class="card">
                <span class="card-label">Rendimiento Físico Individual</span>
                <table>
                    <thead><tr><th>DORSAL</th><th>POS</th><th>DIST (KM)</th><th>V.MÁX</th></tr></thead>
                    <tbody id="p-body"></tbody>
                </table>
                <div id="p-msg" style="text-align:center; padding:30px; font-size:10px; color:var(--tp)">Esperando conexión con Tracker PC...</div>
            </div>
        </section>

        <section id="view-clips" class="view-section">
            <div class="card">
                <span class="card-label">Video Análisis e IA</span>
                <div class="video-box" id="v-wrap">
                    <video id="vplayer" controls poster="https://via.placeholder.com/600x340/111/fff?text=MODULO+VIDEO+READY"></video>
                    <canvas id="canvas-tactico"></canvas>
                </div>
                <div style="display:flex; gap:8px; margin-top:15px">
                    <button class="btn-action btn-p" style="flex:1" onclick="App.toggleDraw()">Lápiz Táctico</button>
                    <button class="btn-action" style="flex:1; background:#333; color:#fff" onclick="App.clearCanvas()">Limpiar</button>
                </div>
            </div>
        </section>

        <section id="view-events" class="view-section">
            <div class="card">
                <div class="team-sel">
                    <button id="selA" class="t-opt active-A" onclick="App.setTeam('A')">EQUIPO A</button>
                    <button id="selB" class="t-opt" onclick="App.setTeam('B')">EQUIPO B</button>
                </div>
                <div class="tag-grid">
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('GOL')">GOL</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('RECUPERACIÓN')">RECUPERACIÓN</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('PÉRDIDA')">PÉRDIDA</button>
                    <button class="tag-btn" style="border-left-color:var(--accent)" onclick="App.log('TIRO')">TIRO</button>
                    <button class="tag-btn" style="border-left-color:var(--tA)" onclick="App.log('FALTA')">FALTA</button>
                    <button class="tag-btn" style="border-left-color:var(--ball)" onclick="App.log('OFFSIDE')">OFFSIDE</button>
                    <button class="tag-btn" style="border-left-color:var(--tB)" onclick="App.log('CÓRNER')">CÓRNER</button>
                    <button class="tag-btn" style="border-left-color:var(--tm)" onclick="App.log('PARADA')">PARADA</button>
                </div>
            </div>
            <div class="card"><div id="log-list"></div></div>
        </section>

        <section id="view-report" class="view-section">
            <div class="card" style="text-align:center; padding:30px 20px;">
                <button class="btn-action btn-p" onclick="App.exportPDF()">Generar Informe Técnico PDF</button>
                <button class="btn-action btn-nanobanana" onclick="App.exportStory()">Exportar Story Nanobanana Gold</button>
            </div>
        </section>
    </main>

    <script>
        const App = {
            db: null, team: 'A', events: [], totalSecs: 0, timerInterval: null, isDrawing: false, lastM: { team_a_goals:0, team_b_goals:0, possession_a:50 },
            
            init: async () => {
                App.db = window.supabase.createClient("https://zdckdlrgtoglmvgdrvcn.supabase.co", "sb_publishable_bGfCRIXGSuGb5XK_SJ0tdw_XYNIHW14");
                App.initCanvas();
                App.sync(); setInterval(App.sync, 5000);
            },
            nav: (id, btn) => {
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).classList.add('active'); btn.classList.add('active');
            },
            adjustTime: (min) => {
                App.totalSecs = Math.max(0, App.totalSecs + (min * 60));
                App.updateClock();
            },
            toggleTimer: () => {
                if(App.timerInterval) { clearInterval(App.timerInterval); App.timerInterval = null; document.getElementById('play-btn').innerText = 'START'; }
                else { App.timerInterval = setInterval(() => { App.totalSecs++; App.updateClock(); }, 1000); document.getElementById('play-btn').innerText = 'PAUSE'; }
            },
            updateClock: () => {
                const m = Math.floor(App.totalSecs / 60).toString().padStart(2,'0');
                const s = (App.totalSecs % 60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            },
            setTeam: (t) => {
                App.team = t;
                document.getElementById('selA').className = t === 'A' ? 't-opt active-A' : 't-opt';
                document.getElementById('selB').className = t === 'B' ? 't-opt active-B' : 't-opt';
            },
            log: (type) => {
                const vid = document.getElementById('vplayer');
                const e = { type, team: App.team, time: document.getElementById('timer-display').innerText, videoSec: vid.currentTime, id: Date.now() };
                App.events.unshift(e);
                document.getElementById('log-list').innerHTML = App.events.map(ev => `
                    <div class="ev-item" onclick="App.jumpTo(${ev.videoSec})">
                        <b>${ev.type} EQ.${ev.team}</b> <span>${ev.time} ➔</span>
                    </div>
                `).join('');
            },
            jumpTo: (sec) => {
                const v = document.getElementById('vplayer');
                App.nav('clips', document.querySelector('[onclick*="clips"]'));
                v.currentTime = sec; v.play();
            },
            sync: async () => {
                const { data } = await App.db.from('matches').select('*').order('created_at', { ascending: false }).limit(1);
                if (data && data[0]) {
                    App.lastM = data[0]; const m = data[0];
                    document.getElementById('sA').innerText = m.team_a_goals; document.getElementById('sB').innerText = m.team_b_goals;
                    const pa = m.possession_a || 50;
                    document.getElementById('pb-a').style.width = pa + "%"; document.getElementById('pb-b').style.width = (100 - pa) + "%";
                    document.getElementById('tx-pa').innerText = pa + "%"; document.getElementById('tx-pb').innerText = (100 - pa) + "%";
                    
                    if (m.full_data?.positions) {
                        const pl = m.full_data.positions;
                        document.getElementById('radar-layer').innerHTML = pl.map(p => `<div class="player-dot" style="left:${p.x}%; top:${p.y}%; background-color:${p.team==='A'?'var(--tA)':'var(--tB)'}">${p.id}</div>`).join('');
                        const lh = (line) => { const g = pl.filter(p => p.line === line && p.team === 'A'); return g.length ? (g.reduce((s,p)=>s+p.x, 0)/g.length).toFixed(0) : 0; };
                        const dA=lh("DEF"), fA=lh("FWD");
                        document.getElementById('res-comp').innerText = Math.abs(fA - dA) + "m";
                        document.getElementById('res-press').innerText = (pl.filter(p=>p.team==='A').reduce((s,p)=>s+p.x,0)/11).toFixed(0) + "m";
                    }
                    if (m.full_data?.players) {
                        document.getElementById('p-msg').style.display = 'none';
                        document.getElementById('p-body').innerHTML = m.full_data.players.map(p => `<tr><td style="color:${p.team==='A'?'var(--tA)':'var(--tB)'}; font-weight:800">#${p.id}</td><td>${p.pos || 'MID'}</td><td>${p.dist || '0.00'}</td><td style="color:var(--accent)">${p.maxSpd || '0.0'}</td></tr>`).join('');
                    }
                }
            },
            initCanvas: () => {
                const cv = document.getElementById('canvas-tactico'); const ctx = cv.getContext('2d'); let draw = false;
                cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
                cv.addEventListener('touchstart', (e) => { if(!App.isDrawing) return; draw = true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - cv.getBoundingClientRect().left, e.touches[0].clientY - cv.getBoundingClientRect().top); });
                cv.addEventListener('touchmove', (e) => { if(!draw) return; ctx.lineTo(e.touches[0].clientX - cv.getBoundingClientRect().left, e.touches[0].clientY - cv.getBoundingClientRect().top); ctx.strokeStyle = '#00d68f'; ctx.lineWidth = 3; ctx.stroke(); });
                cv.addEventListener('touchend', () => draw = false);
            },
            toggleDraw: () => { App.isDrawing = !App.isDrawing; document.getElementById('canvas-tactico').classList.toggle('active', App.isDrawing); },
            clearCanvas: () => { const cv = document.getElementById('canvas-tactico'); cv.getContext('2d').clearRect(0,0,cv.width,cv.height); },
            exportPDF: () => { window.print(); },
            exportStory: () => {
                const m = App.lastM; const win = window.open('', '_blank', 'width=375,height=812');
                win.document.write(`<html><body style="background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:50px"><h1 style="font-size:120px;font-weight:900;letter-spacing:-8px">${m.team_a_goals}<br>${m.team_b_goals}</h1><div style="font-size:42px;font-weight:900;color:#00d68f">${m.possession_a}% POSS.</div><p style="margin-top:100px;font-weight:700;letter-spacing:4px;color:#444">ANALYTICSFUTBOL ELITE</p></body></html>`);
                win.document.close();
            }
        };
        window.onload = App.init;
    </script>
</body>
</html>
